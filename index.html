<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ሳይንት ሊንክ ፕሮ | Sayint Link Ultimate</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://meet.jit.si/external_api.js'></script>

    <style>
        :root { --primary: #075e54; --accent: #25d366; --bg: #efe7dd; --white: #ffffff; --gray: #777; --danger: #e74c3c; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; flex-direction: column; transition: 0.3s; }
        
        .dark-mode { --bg: #121212; --white: #1e1e1e; --gray: #bdc3c7; --primary: #1f2c33; }

        /* Login */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 85%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Header */
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 65px; box-sizing: border-box; z-index: 1000; }
        .btn-live { background: var(--danger); color: white; border: none; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* Chat Area */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); padding-bottom: 50px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 85%; }
        .sent { align-self: flex-end; align-items: flex-end; }
        .received { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent .bubble { background: #dcf8c6; border-top-right-radius: 0; }
        .received .bubble { background: var(--white); border-top-left-radius: 0; }
        .msg-img { width: 100%; max-width: 250px; border-radius: 10px; cursor: pointer; margin-top: 5px; }

        /* Footer Input */
        .footer-input { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 8px; height: 70px; box-sizing: border-box; border-top: 1px solid #ddd; z-index: 1000; }
        .msg-input { flex: 1; background: white; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        .circle-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .btn-file { background: #555; }
        
        /* Video & Image Overlay */
        #videoContainer { display: none; position: fixed; top: 65px; left: 0; width: 100%; height: calc(100% - 135px); background: black; z-index: 2000; }
        #fullScreenOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; }
        #fullImg { max-width: 95%; max-height: 95%; border-radius: 10px; }

        .recording { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body id="body">

<div id="loginScreen">
    <div class="login-card">
        <h1 style="color:var(--primary); margin:0;">ሳይንት ሊንክ</h1>
        <p style="color:var(--gray); margin-bottom: 20px;">በስልክ ቁጥር ይግቡ</p>
        <input type="text" id="phoneInput" placeholder="ስልክ ቁጥር (09...)">
        <input type="password" id="passInput" placeholder="ፓስወርድ">
        <button class="circle-btn" style="width:100%; border-radius:15px; background:var(--accent);" onclick="handleLogin()">መልክተኛውን ክፈት</button>
    </div>
</div>

<header>
    <div><h3 id="myTitle" style="margin:0; font-size:17px;">Sayint Link</h3><small>ግንኙነት ተፈጥሯል ✅</small></div>
    <div style="display: flex; align-items: center;">
        <button style="background:none; border:none; color:white; font-size:18px; margin-right:15px;" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        <button class="btn-live" id="liveToggleBtn" onclick="toggleLive()"><i class="fas fa-video"></i> Live</button>
    </div>
</header>

<div id="fullScreenOverlay" onclick="this.style.display='none'"><img id="fullImg" src=""></div>
<div id="videoContainer"></div>
<div id="chatBox"></div>

<div class="footer-input">
    <button class="circle-btn btn-file" onclick="document.getElementById('fileInput').click()"><i class="fas fa-camera"></i></button>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="sendImage(this)">
    <button id="micBtn" class="circle-btn" style="background:#555;" onclick="startVoice()"><i id="micIcon" class="fas fa-microphone"></i></button>
    <input type="text" id="msgInput" class="msg-input" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') sendText()">
    <button class="circle-btn" onclick="sendText()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    let myPhone = "", mediaRecorder, chunks = [], jitsiApi = null;

    // --- Authentication ---
    async function handleLogin() {
        const phone = document.getElementById('phoneInput').value, pass = document.getElementById('passInput').value;
        if(phone.length < 10) return alert("ስልክ ያስገቡ!");
        const fakeEmail = phone + "@sayint.com";
        try { await auth.signInWithEmailAndPassword(fakeEmail, pass); } catch(e) { await auth.createUserWithEmailAndPassword(fakeEmail, pass); }
    }
    auth.onAuthStateChanged(user => {
        if(user) { myPhone = user.email.split('@')[0]; document.getElementById('loginScreen').style.display = "none"; document.getElementById('myTitle').innerText = "📱 " + myPhone; }
    });

    // --- Messaging (Text & Image) ---
    function sendText() {
        const txt = document.getElementById('msgInput').value.trim();
        if(!txt) return;
        db.ref('messages').push({ sender: myPhone, type: 'text', content: txt, time: getTime() });
        document.getElementById('msgInput').value = "";
    }

    async function sendImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = function(e) {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 600; let w=img.width, h=img.height;
                if(w>MAX){h*=MAX/w; w=MAX;} canvas.width=w; canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                db.ref('messages').push({ sender: myPhone, type: 'image', content: canvas.toDataURL("image/jpeg", 0.6), time: getTime() });
            };
        };
    }

    // --- Voice & Live ---
    async function startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const r = new FileReader(); r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
            r.onloadend = () => { db.ref('messages').push({ sender: myPhone, type: 'voice', content: r.result, time: getTime() }); };
        };
        mediaRecorder.start();
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('micIcon').className = "fas fa-stop";
        document.getElementById('micBtn').onclick = () => mediaRecorder.stop();
    }

    function toggleLive() {
        const container = document.getElementById('videoContainer'), btn = document.getElementById('liveToggleBtn');
        if (container.style.display === "none" || container.style.display === "") {
            container.style.display = "block"; btn.innerHTML = 'ዝጋ';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Sayint_Link_Live_Room", width: "100%", height: "100%", parentNode: container, configOverwrite: { disableDeepLinking: true }, userInfo: { displayName: myPhone } });
        } else { container.style.display = "none"; btn.innerHTML = 'Live'; if (jitsiApi) jitsiApi.dispose(); }
    }

    // --- Receive & Render ---
    db.ref('messages').limitToLast(40).on('child_added', snap => {
        const m = snap.val(), isMe = m.sender === myPhone, chatBox = document.getElementById('chatBox');
        let content = m.type === 'text' ? m.content : (m.type === 'image' ? `<img src="${m.content}" class="msg-img" onclick="openFS(this.src)">` : `<audio controls src="${m.content}"></audio>`);
        chatBox.insertAdjacentHTML('beforeend', `<div class="msg-wrap ${isMe?'sent':'received'}"><span style="font-size:10px; font-weight:bold; color:var(--primary);">${isMe?'እኔ':m.sender}</span><div class="bubble">${content}</div><span style="font-size:9px; color:gray;">${m.time}</span></div>`);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function openFS(s) { document.getElementById('fullImg').src = s; document.getElementById('fullScreenOverlay').style.display = "flex"; }
    function toggleTheme() { document.getElementById('body').classList.toggle('dark-mode'); }
</script>
</body>
</html>
