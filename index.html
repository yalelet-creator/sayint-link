<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ሳይንት ሊንክ | Sayint Link IMO</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://meet.jit.si/external_api.js'></script>

    <style>
        :root { --imo-blue: #0088cc; --imo-bg: #f0f2f5; --white: #ffffff; --sent-msg: #e1f5fe; --received-msg: #ffffff; }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--imo-bg); font-family: 'Segoe UI', Arial, sans-serif; }

        /* Login Page */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--imo-blue); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Header */
        header { background: var(--imo-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        
        /* Main View */
        #mainView { display: flex; flex-direction: column; height: 100%; }
        .tab-content { flex: 1; overflow-y: auto; display: none; }
        .active-tab { display: block; }

        /* Chat List Item (IMO Style) */
        .chat-item { background: white; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ccc; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; }
        .chat-info b { font-size: 16px; color: #333; }
        .chat-info p { margin: 0; font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Individual Chat Room */
        #chatRoom { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #e5ddd5; z-index: 2000; display: flex; flex-direction: column; transition: 0.3s; }
        .room-header { background: var(--imo-blue); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--sent-msg); border-top-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--received-msg); border-top-left-radius: 2px; }

        /* Chat Input Bar */
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .msg-in { flex: 1; background: white; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .icon-btn { color: var(--imo-blue); font-size: 22px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { background: white; height: 60px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--imo-blue); }

        /* Video Overlay */
        #videoBox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 4000; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--imo-blue)">ሳይንት ሊንክ</h2>
        <input type="text" id="phoneInput" placeholder="ስልክ ቁጥር (09...)">
        <input type="text" id="nameInput" placeholder="ሙሉ ስምዎ">
        <input type="password" id="passInput" placeholder="ፓስወርድ">
        <button class="btn" style="background:var(--imo-blue); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold;" onclick="handleLogin()">ግባ</button>
    </div>
</div>

<!-- Video Call View -->
<div id="videoBox">
    <button style="position:absolute; top:30px; right:20px; z-index:4001; background:red; color:white; border:none; padding:10px; border-radius:50%;" onclick="stopCall()"><i class="fas fa-times"></i></button>
</div>

<!-- Chat Room View (Individual) -->
<div id="chatRoom">
    <div class="room-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <div class="avatar" id="roomAvatar" style="width:35px; height:35px; font-size:14px;"></div>
        <b id="roomTitle">ስማቸው</b>
        <i class="fas fa-video" style="margin-left:auto;" onclick="startCall()"></i>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('fileIn').click()"></i>
        <input type="file" id="fileIn" hidden onchange="sendImg(this)">
        <input type="text" id="msgInput" class="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') sendTxt()">
        <i class="fas fa-paper-plane icon-btn" onclick="sendTxt()"></i>
    </div>
</div>

<div id="mainView">
    <header>
        <h3>Sayint Link</h3>
        <div style="display:flex; gap:15px;">
            <i class="fas fa-search"></i>
            <i class="fas fa-user-plus" onclick="switchTab('contacts', document.getElementById('contactTab'))"></i>
        </div>
    </header>

    <!-- 1. Chats List -->
    <div id="chatsView" class="tab-content active-tab">
        <div class="chat-item" onclick="openChat('global', 'የሳይንት ጋራ ግሩፕ')">
            <div class="avatar" style="background:var(--imo-blue)"><i class="fas fa-users"></i></div>
            <div class="chat-info"><b>የሳይንት ጋራ ግሩፕ</b><p>ለሁሉም የሳይንት ልጆች ክፍት የሆነ ግሩፕ</p></div>
        </div>
        <div id="recentChats"></div>
    </div>

    <!-- 2. Explore/Stories -->
    <div id="exploreView" class="tab-content">
        <div style="padding:15px;"><button style="background:var(--imo-blue); color:white; border:none; padding:12px; border-radius:10px; width:100%;" onclick="document.getElementById('storyIn').click()">+ አዲስ ታሪክ (Story) ልጠፍ</button></div>
        <input type="file" id="storyIn" hidden accept="image/*" onchange="postStory(this)">
        <div id="storyList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;"></div>
    </div>

    <!-- 3. Contacts List -->
    <div id="contactsView" class="tab-content">
        <div id="contactList"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="chatTab" onclick="switchTab('chats', this)"><i class="fas fa-comment"></i>CHATS</div>
        <div class="nav-item" onclick="switchTab('explore', this)"><i class="fas fa-compass"></i>EXPLORE</div>
        <div class="nav-item" id="contactTab" onclick="switchTab('contacts', this)"><i class="fas fa-address-book"></i>CONTACTS</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    let myPhone = "", myName = "", currentChatId = "", chatRef = null, jitsiApi = null;

    // --- Tab Switcher ---
    function switchTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab + 'View').classList.add('active-tab');
        el.classList.add('active');
    }

    // --- Authentication ---
    async function handleLogin() {
        const p = document.getElementById('phoneInput').value, n = document.getElementById('nameInput').value, pw = document.getElementById('passInput').value;
        if(p.length < 10 || !n) return alert("መረጃ ያሟሉ!");
        const email = p + "@sayint.com";
        try { await auth.signInWithEmailAndPassword(email, pw); } catch(e) { await auth.createUserWithEmailAndPassword(email, pw); }
        db.ref('users/' + p).set({ phone: p, name: n, lastSeen: Date.now() });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            myPhone = user.email.split('@')[0];
            document.getElementById('loginScreen').style.display = "none";
            db.ref('users/' + myPhone).once('value', s => { if(s.exists()) myName = s.val().name; });
            loadData();
        }
    });

    // --- Chat Logic ---
    function openChat(id, title) {
        currentChatId = id;
        document.getElementById('chatRoom').style.left = "0";
        document.getElementById('roomTitle').innerText = title;
        document.getElementById('roomAvatar').innerText = title.charAt(0);
        
        const box = document.getElementById('messages'); box.innerHTML = "";
        if(chatRef) chatRef.off();
        chatRef = db.ref('messages/' + id);
        chatRef.limitToLast(40).on('child_added', snap => {
            const m = snap.val(), isMe = m.senderPhone === myPhone;
            let content = m.type === 'text' ? m.content : `<img src="${m.content}" class="msg-img" onclick="window.open(this.src)">`;
            box.innerHTML += `<div class="msg-wrap ${isMe?'sent':'received'}"><div class="bubble">${content}</div></div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chatRoom').style.left = "100%"; if(chatRef) chatRef.off(); }

    function sendTxt() {
        const val = document.getElementById('msgInput').value;
        if(!val) return;
        db.ref('messages/' + currentChatId).push({ senderName: myName, senderPhone: myPhone, type: 'text', content: val, time: Date.now() });
        document.getElementById('msgInput').value = "";
    }

    async function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('messages/' + currentChatId).push({ senderPhone: myPhone, type: 'image', content: e.target.result });
    }

    // --- Load Users & Stories ---
    function loadData() {
        // Contacts
        db.ref('users').on('value', s => {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                if(u.phone !== myPhone) {
                    const chatId = [myPhone, u.phone].sort().join('_');
                    list.innerHTML += `<div class="chat-item" onclick="openChat('${chatId}', '${u.name}')"><div class="avatar">${u.name.charAt(0)}</div><div class="chat-info"><b>${u.name}</b><p>${u.phone}</p></div></div>`;
                }
            });
        });
        // Explore/Stories
        db.ref('stories').on('value', s => {
            const grid = document.getElementById('storyList'); grid.innerHTML = "";
            s.forEach(c => {
                const st = c.val();
                grid.innerHTML += `<div class="story-card"><img src="${st.img}"><div class="story-name">${st.sender}</div></div>`;
            });
        });
    }

    async function postStory(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('stories').push({ sender: myName, img: e.target.result });
    }

    // --- Video Call ---
    function startCall() {
        document.getElementById('videoBox').style.display = "block";
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Sayint_Link_Call_" + currentChatId, width: "100%", height: "100%", parentNode: document.getElementById('videoBox'), configOverwrite: { disableDeepLinking: true } });
    }
    function stopCall() { document.getElementById('videoBox').style.display = "none"; if(jitsiApi) jitsiApi.dispose(); }

</script>
</body>
</html>
