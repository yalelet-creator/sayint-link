<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ሳይንት ሊንክ | Sayint Link Pro</title>
    
    <!-- PWA & Libraries -->
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://meet.jit.si/external_api.js'></script>

    <style>
        :root { --primary: #0088cc; --accent: #2ecc71; --bg: #f5f6f7; --white: #ffffff; --text: #2c3e50; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }

        /* Navigation Layout */
        #mainContainer { display: flex; flex-direction: column; height: 100%; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .content-area { flex: 1; overflow-y: auto; display: none; }
        .active-area { display: block; }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 85%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Bottom Nav */
        .bottom-nav { background: white; height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { color: #888; text-align: center; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* Chat Styles */
        #chatBox { padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; min-height: 100%; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 5px; }
        .sent { align-self: flex-end; } .received { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent .bubble { background: #dcf8c6; border-top-right-radius: 0; }
        .received .bubble { background: white; border-top-left-radius: 0; }
        .msg-img { width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* Input Bar */
        #chatInputArea { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .msg-input { flex: 1; background: white; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        /* Stories UI */
        .story-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .story-card { background: white; border-radius: 15px; overflow: hidden; height: 200px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .story-card img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { position: absolute; bottom: 10px; left: 10px; color: white; font-weight: bold; text-shadow: 0 2px 5px black; }

        /* Contacts UI */
        .contact-item { background: white; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .avatar { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Video Call */
        #videoContainer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 4000; }
        .close-call { position: absolute; top: 30px; right: 20px; z-index: 4001; background: red; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body id="body">

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <h1 style="color:var(--primary)">ሳይንት ሊንክ</h1>
        <p>በስልክ ቁጥርዎ ይግቡ</p>
        <input type="text" id="phoneInput" placeholder="ስልክ ቁጥር (09...)">
        <input type="password" id="passInput" placeholder="ፓስወርድ">
        <button class="btn" style="background:var(--accent); color:white; width:100%; padding:15px; border-radius:15px;" onclick="handleLogin()">ክፈት</button>
    </div>
</div>

<div id="videoContainer">
    <button class="close-call" onclick="stopLive()"><i class="fas fa-times"></i></button>
</div>

<div id="mainContainer">
    <header>
        <div id="headerTitle"><h3>Chats</h3></div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="fas fa-search"></i>
            <button style="background:none; border:none; color:white; font-size:18px;" onclick="startLive()"><i class="fas fa-video"></i></button>
        </div>
    </header>

    <!-- 1. Chats View -->
    <div id="chatsView" class="content-area active-area">
        <div id="chatBox"></div>
        <div id="chatInputArea">
            <button style="background:none; border:none; color:var(--primary); font-size:20px;" onclick="document.getElementById('fileInput').click()"><i class="fas fa-camera"></i></button>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="sendImage(this)">
            <input type="text" id="msgInput" class="msg-input" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') sendText()">
            <button style="background:none; border:none; color:var(--primary); font-size:22px;" onclick="sendText()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- 2. Contacts View -->
    <div id="contactsView" class="content-area">
        <div id="contactList">
            <!-- ተጠቃሚዎች እዚህ ይወጣሉ -->
        </div>
    </div>

    <!-- 3. Stories View -->
    <div id="storiesView" class="content-area">
        <div style="padding:15px;">
            <button class="btn" onclick="document.getElementById('storyInput').click()">+ የኔን ታሪክ (Story) ልጠፍ</button>
            <input type="file" id="storyInput" hidden accept="image/*" onchange="postStory(this)">
        </div>
        <div id="storyGrid" class="story-grid"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('chats', this)"><i class="fas fa-comment"></i>Chats</div>
        <div class="nav-item" onclick="switchTab('stories', this)"><i class="fas fa-circle-notch"></i>Stories</div>
        <div class="nav-item" onclick="switchTab('contacts', this)"><i class="fas fa-users"></i>Contacts</div>
    </div>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    let myPhone = "", jitsiApi = null;

    // --- Tab Switcher ---
    function switchTab(tab, el) {
        document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active-area'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab + 'View').classList.add('active-area');
        el.classList.add('active');
        document.querySelector('#headerTitle h3').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
    }

    // --- Authentication & User Sync ---
    async function handleLogin() {
        const phone = document.getElementById('phoneInput').value, pass = document.getElementById('passInput').value;
        if(phone.length < 10) return alert("ስልክ ያስገቡ!");
        const email = phone + "@sayint.com";
        try { 
            await auth.signInWithEmailAndPassword(email, pass); 
        } catch(e) { 
            await auth.createUserWithEmailAndPassword(email, pass); 
        }
        db.ref('users/' + phone).set({ phone: phone, lastSeen: Date.now() });
    }

    auth.onAuthStateChanged(user => {
        if(user) { 
            myPhone = user.email.split('@')[0];
            document.getElementById('loginScreen').style.display = "none";
            loadContacts();
        }
    });

    // --- Chat Logic ---
    function sendText() {
        const txt = document.getElementById('msgInput').value.trim();
        if(!txt) return;
        db.ref('messages').push({ sender: myPhone, type: 'text', content: txt, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        document.getElementById('msgInput').value = "";
    }

    async function sendImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('messages').push({ sender: myPhone, type: 'image', content: e.target.result, time: 'Now' });
    }

    db.ref('messages').limitToLast(30).on('child_added', snap => {
        const m = snap.val(), isMe = m.sender === myPhone, chatBox = document.getElementById('chatBox');
        let content = m.type === 'text' ? m.content : `<img src="${m.content}" class="msg-img">`;
        chatBox.innerHTML += `<div class="msg-wrap ${isMe?'sent':'received'}"><div class="bubble">${content}</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // --- Contacts Logic ---
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                list.innerHTML += `<div class="contact-item"><div class="avatar">${u.phone.charAt(0)}</div><div>${u.phone}</div></div>`;
            });
        });
    }

    // --- Stories Logic ---
    async function postStory(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('stories').push({ sender: myPhone, img: e.target.result, time: Date.now() });
    }

    db.ref('stories').on('value', snap => {
        const grid = document.getElementById('storyGrid'); grid.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            grid.innerHTML += `<div class="story-card"><img src="${s.img}"><div class="story-name">${s.sender}</div></div>`;
        });
    });

    // --- Video Call ---
    function startLive() {
        document.getElementById('videoContainer').style.display = "block";
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Sayint_Link_Grand_Meeting", width: "100%", height: "100%", parentNode: document.getElementById('videoContainer'), configOverwrite: { disableDeepLinking: true } });
    }
    function stopLive() { document.getElementById('videoContainer').style.display = "none"; if(jitsiApi) jitsiApi.dispose(); }

</script>
</body>
</html>
