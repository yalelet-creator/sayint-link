<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ሳይንት ሊንክ ፕሮ | Sayint Link Absolute</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://meet.jit.si/external_api.js'></script>

    <style>
        :root { --imo-blue: #00b0ff; --imo-bg: #f4f4f4; --sent: #e1f5fe; --received: #ffffff; --dark: #2c3e50; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--imo-bg); font-family: 'Segoe UI', Arial, sans-serif; }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--imo-blue); display: flex; align-items: center; justify-content: center; z-index: 6000; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Main View Layout */
        #mainContainer { display: flex; flex-direction: column; height: 100%; }
        header { background: var(--imo-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; position: relative; }
        
        /* 3-Dot Menu */
        .menu-dropdown { display: none; position: absolute; top: 50px; right: 10px; background: white; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 10px; width: 150px; z-index: 5000; }
        .menu-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }

        /* Tabs and Content */
        .content-body { flex: 1; overflow-y: auto; display: none; }
        .active-tab { display: block; }
        .item-row { background: white; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #00b0ff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* Chat Room Overlay */
        #chatRoom { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #e5ddd5; z-index: 4000; display: flex; flex-direction: column; transition: 0.3s; }
        .room-header { background: var(--imo-blue); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; height: 60px; }
        #messageBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--sent); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: var(--received); border-top-left-radius: 0; }

        /* Chat Input Bar (IMO Style) */
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .msg-in { flex: 1; background: white; padding: 12px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 16px; }

        /* Bottom Nav */
        .bottom-nav { background: white; height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 2000; }
        .nav-btn { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-btn.active { color: var(--imo-blue); }

        /* Video Call */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 5000; }
        .close-call { position: absolute; top: 30px; right: 20px; background: red; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 5001; }
    </style>
</head>
<body id="body">

<!-- 1. Login View -->
<div id="loginScreen">
    <div class="login-card">
        <h1 style="color:var(--imo-blue); margin:0 0 10px 0;">ሳይንት ሊንክ</h1>
        <input type="text" id="phoneIn" placeholder="ስልክ ቁጥር (09...)">
        <input type="text" id="nameIn" placeholder="ሙሉ ስምዎ">
        <input type="password" id="passIn" placeholder="ፓስወርድ">
        <button class="btn" style="background:var(--imo-blue); color:white; width:100%; border-radius:15px;" onclick="handleLogin()">መተግበሪያውን ክፈት</button>
    </div>
</div>

<!-- 2. Video Call Overlay -->
<div id="videoOverlay"><button class="close-call" onclick="stopCall()"><i class="fas fa-times"></i></button></div>

<!-- 3. Chat Room View -->
<div id="chatRoom">
    <div class="room-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <div class="avatar" id="roomAvatar" style="width:35px; height:35px; font-size:14px;"></div>
        <b id="roomTitle">ስማቸው</b>
        <i class="fas fa-video" style="margin-left:auto; font-size:20px;" onclick="startCall()"></i>
    </div>
    <div id="messageBox"></div>
    <div class="input-bar">
        <i class="fas fa-microphone icon-btn" id="micBtn" style="color:var(--imo-blue); cursor:pointer;" onclick="startVoice()"></i>
        <i class="fas fa-camera icon-btn" style="color:var(--imo-blue); cursor:pointer;" onclick="document.getElementById('imgIn').click()"></i>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendImg(this)">
        <input type="text" id="msgIn" class="msg-in" placeholder="መልዕክት...">
        <i class="fas fa-paper-plane icon-btn" style="color:var(--imo-blue); cursor:pointer;" onclick="sendTxt()"></i>
    </div>
</div>

<!-- 4. Main App Container -->
<div id="mainContainer">
    <header>
        <h3>Sayint Link</h3>
        <div style="display:flex; gap:20px; align-items:center;">
            <i class="fas fa-search" onclick="toggleSearch()"></i>
            <i class="fas fa-ellipsis-v" onclick="toggleMenu()"></i>
        </div>
        <!-- 3-Dot Menu Dropdown -->
        <div id="menuDropdown" class="menu-dropdown">
            <div class="menu-item" onclick="toggleTheme()">Dark/Light Mode</div>
            <div class="menu-item" onclick="logout()">Logout</div>
            <div class="menu-item" onclick="alert('በያለለት የተገነባ V1.0')">About</div>
        </div>
    </header>

    <!-- Search Bar (Hidden by default) -->
    <div id="searchArea" style="display:none; padding:10px; background:white;">
        <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="ጓደኛ ወይም ግሩፕ ይፈልጉ..." style="margin-bottom:0;">
    </div>

    <!-- CHATS TAB -->
    <div id="chatsTab" class="content-body active-tab">
        <div class="item-row" onclick="openChat('global', 'የሳይንት ጋራ ግሩፕ')">
            <div class="avatar"><i class="fas fa-users"></i></div>
            <div style="flex:1;"><b>የሳይንት ጋራ ግሩፕ</b><p>የጋራ አደባባይ</p></div>
        </div>
        <div id="chatHistory"></div>
    </div>

    <!-- EXPLORE TAB -->
    <div id="exploreTab" class="content-body">
        <div style="padding:15px;"><button class="btn" onclick="document.getElementById('stIn').click()">+ የኔን ታሪክ (Story) ልጠፍ</button></div>
        <input type="file" id="stIn" hidden accept="image/*" onchange="postStory(this)">
        <div id="storyList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;"></div>
    </div>

    <!-- CONTACTS TAB -->
    <div id="contactsTab" class="content-body">
        <div class="item-row" onclick="pickPhoneContact()" style="color:var(--imo-blue); font-weight:bold;">
            <i class="fas fa-plus-circle"></i> ከስልክዎ ኮንታክት ይጨምሩ
        </div>
        <div id="contactList"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-btn active" id="btn-chats" onclick="switchTab('chats')"><i class="fas fa-comment"></i>CHATS</div>
        <div class="nav-btn" id="btn-explore" onclick="switchTab('explore')"><i class="fas fa-compass"></i>EXPLORE</div>
        <div class="nav-btn" id="btn-contacts" onclick="switchTab('contacts')"><i class="fas fa-address-book"></i>CONTACTS</div>
    </div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ", authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye", storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179", appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    let myPhone = "", myName = "", currentChatId = "", chatRef = null, jitsiApi = null, allUsers = [];

    // --- Authentication ---
    async function handleLogin() {
        const p = document.getElementById('phoneIn').value, n = document.getElementById('nameIn').value, pw = document.getElementById('passIn').value;
        if(p.length < 10 || !n) return alert("መረጃ ያሟሉ!");
        const email = p + "@sayint.com";
        try { await auth.signInWithEmailAndPassword(email, pw); } catch(e) { await auth.createUserWithEmailAndPassword(email, pw); }
        db.ref('users/' + p).set({ phone: p, name: n, avatar: n.charAt(0) });
    }

    auth.onAuthStateChanged(user => {
        if(user) { myPhone = user.email.split('@')[0]; document.getElementById('loginScreen').style.display = "none"; loadApp(); }
    });

    function logout() { auth.signOut(); location.reload(); }

    // --- UI Controls ---
    function switchTab(tab) {
        document.querySelectorAll('.content-body').forEach(b => b.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active-tab');
        document.getElementById('btn-' + tab).classList.add('active');
    }

    function toggleMenu() { const m = document.getElementById('menuDropdown'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function toggleSearch() { const s = document.getElementById('searchArea'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); toggleMenu(); }

    // --- Phone Contact Picker ---
    async function pickPhoneContact() {
        try {
            const props = ['name', 'tel'];
            const opts = { multiple: false };
            const contacts = await navigator.contacts.select(props, opts);
            if(contacts.length) alert("የመረጡት ኮንታክት፦ " + contacts[0].name);
        } catch(e) { alert("ይህ ብሮውዘር ኮንታክት እንዲከፈት አልፈቀደም።"); }
    }

    // --- Chat Logic ---
    function openChat(id, title) {
        currentChatId = id; document.getElementById('chatRoom').style.left = "0";
        document.getElementById('roomTitle').innerText = title;
        document.getElementById('roomAvatar').innerText = title.charAt(0);
        const box = document.getElementById('messageBox'); box.innerHTML = "";
        if(chatRef) chatRef.off();
        chatRef = db.ref('messages/' + id);
        chatRef.limitToLast(40).on('child_added', s => {
            const m = s.val(), isMe = m.senderPhone === myPhone;
            let content = m.type === 'text' ? m.content : (m.type === 'image' ? `<img src="${m.content}" style="width:100%; border-radius:10px;">` : `<audio controls src="${m.content}"></audio>`);
            box.innerHTML += `<div class="sent received ${isMe?'sent':'received'}"><div class="bubble">${content}</div></div>`;
            box.scrollTop = box.scrollHeight;
        });
    }
    function closeChat() { document.getElementById('chatRoom').style.left = "100%"; }

    function sendTxt() {
        const val = document.getElementById('msgIn').value; if(!val) return;
        db.ref('messages/' + currentChatId).push({ senderPhone: myPhone, type: 'text', content: val });
        document.getElementById('msgIn').value = "";
    }

    async function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('messages/' + currentChatId).push({ senderPhone: myPhone, type: 'image', content: e.target.result });
    }

    async function startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRec = new MediaRecorder(stream); let chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            const reader = new FileReader(); reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => db.ref('messages/' + currentChatId).push({ senderPhone: myPhone, type: 'voice', content: reader.result });
        };
        mediaRec.start();
        document.getElementById('micBtn').style.color = "red";
        document.getElementById('micBtn').onclick = () => { mediaRec.stop(); document.getElementById('micBtn').style.color = "var(--imo-blue)"; document.getElementById('micBtn').onclick = startVoice; };
    }

    // --- Load Data ---
    function loadApp() {
        db.ref('users').on('value', s => {
            allUsers = []; const list = document.getElementById('contactList'); list.innerHTML = "";
            s.forEach(c => {
                const u = c.val(); if(u.phone === myPhone) return;
                allUsers.push(u);
                const chatId = [myPhone, u.phone].sort().join('_');
                list.innerHTML += `<div class="item-row" onclick="openChat('${chatId}', '${u.name}')"><div class="avatar">${u.avatar}</div><div><b>${u.name}</b><p>${u.phone}</p></div></div>`;
            });
        });
        db.ref('stories').on('value', s => {
            const list = document.getElementById('storyList'); list.innerHTML = "";
            s.forEach(c => { const st = c.val(); list.innerHTML += `<div style="background:white; border-radius:10px; overflow:hidden;"><img src="${st.img}" style="width:100%; height:150px; object-fit:cover;"><p style="font-size:10px; padding:5px;">${st.sender}</p></div>`; });
        });
    }

    async function postStory(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('stories').push({ sender: myPhone, img: e.target.result });
    }

    function startCall() {
        document.getElementById('videoOverlay').style.display = "block";
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Sayint_Call_" + currentChatId, width: "100%", height: "100%", parentNode: document.getElementById('videoOverlay'), configOverwrite: { disableDeepLinking: true } });
    }
    function stopCall() { document.getElementById('videoOverlay').style.display = "none"; if(jitsiApi) jitsiApi.dispose(); }

    function filterItems() {
        const t = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(t) ? "flex" : "none"; });
    }
</script>
</body>
</html>
