<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ሳይንት ሊንክ | Sayint Link Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src='https://meet.jit.si/external_api.js'></script>

    <style>
        :root { --imo-blue: #00b0ff; --imo-bg: #f4f4f4; --sent: #e1f5fe; --received: #ffffff; --dark: #2c3e50; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--imo-bg); font-family: 'Segoe UI', Arial, sans-serif; }

        /* Login */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--imo-blue); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Layout */
        #mainWrapper { display: flex; flex-direction: column; height: 100%; }
        header { background: var(--imo-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        .content-body { flex: 1; overflow-y: auto; display: none; }
        .active-tab { display: block; }

        /* Chat List */
        .item-row { background: white; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #00b0ff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .item-info { flex: 1; }
        .item-info b { font-size: 16px; color: #333; }
        .item-info p { margin: 0; font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat Room Overlay */
        #chatRoom { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #e5ddd5; z-index: 3000; display: flex; flex-direction: column; transition: 0.3s; }
        .room-header { background: var(--imo-blue); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; height: 60px; }
        #messageBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--sent); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: var(--received); border-top-left-radius: 0; }
        .sender-n { font-size: 10px; font-weight: bold; color: var(--imo-blue); display: block; margin-bottom: 3px; }

        /* Input Bar */
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .msg-in { flex: 1; background: white; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }

        /* Bottom Nav */
        .bottom-nav { background: white; height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 2000; }
        .nav-btn { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-btn i { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-btn.active { color: var(--imo-blue); }

        /* Floating Action Button */
        .fab { position: fixed; bottom: 85px; right: 20px; background: var(--imo-blue); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 1000; }

        /* Video Box */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 4000; }
        .close-vid { position: absolute; top: 30px; right: 20px; background: red; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 4001; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--imo-blue)">ሳይንት ሊንክ</h2>
        <input type="text" id="phoneIn" placeholder="ስልክ ቁጥር (09...)">
        <input type="text" id="nameIn" placeholder="ሙሉ ስምዎ">
        <input type="password" id="passIn" placeholder="ፓስወርድ">
        <button class="btn" style="background:var(--imo-blue); color:white;" onclick="handleLogin()">መተግበሪያውን ክፈት</button>
    </div>
</div>

<div id="videoOverlay">
    <button class="close-vid" onclick="stopCall()"><i class="fas fa-times"></i></button>
</div>

<!-- Chat Room View -->
<div id="chatRoom">
    <div class="room-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <div class="avatar" id="roomAvatar" style="width:35px; height:35px; font-size:14px;"></div>
        <b id="roomTitle">ስማቸው</b>
        <i class="fas fa-video" style="margin-left:auto;" onclick="startCall()"></i>
    </div>
    <div id="messageBox"></div>
    <div class="input-bar">
        <i class="fas fa-microphone icon-btn" id="micBtn" style="color:var(--imo-blue)" onclick="startVoice()"></i>
        <i class="fas fa-camera icon-btn" style="color:var(--imo-blue)" onclick="document.getElementById('imgIn').click()"></i>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendImg(this)">
        <input type="text" id="msgInput" class="msg-in" placeholder="መልዕክት..." onkeypress="if(event.key==='Enter') sendTxt()">
        <i class="fas fa-paper-plane icon-btn" style="color:var(--imo-blue)" onclick="sendTxt()"></i>
    </div>
</div>

<div id="mainWrapper">
    <header>
        <h3>Sayint Link</h3>
        <div style="display:flex; gap:15px;"><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
    </header>

    <!-- 1. CHATS TAB -->
    <div id="chatsTab" class="content-body active-tab">
        <div id="chatHistoryList">
            <!-- ያወሯቸው ሰዎችና ግሩፖች እዚህ ይወጣሉ -->
        </div>
    </div>

    <!-- 2. EXPLORE/STORIES TAB -->
    <div id="storiesTab" class="content-body">
        <div style="padding:15px;"><button class="btn" onclick="document.getElementById('stIn').click()">+ አዲስ ታሪክ (Story) ልጠፍ</button></div>
        <input type="file" id="stIn" hidden accept="image/*" onchange="postStory(this)">
        <div id="storyList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;"></div>
    </div>

    <!-- 3. CONTACTS TAB -->
    <div id="contactsTab" class="content-body">
        <div id="allContactsList"></div>
    </div>

    <!-- FAB for Creating Group -->
    <div class="fab" onclick="createGroup()"><i class="fas fa-users"></i></div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="switchTab('chats', this)"><i class="fas fa-comment"></i>CHATS</div>
        <div class="nav-btn" onclick="switchTab('stories', this)"><i class="fas fa-circle-notch"></i>EXPLORE</div>
        <div class="nav-btn" onclick="switchTab('contacts', this)"><i class="fas fa-address-book"></i>CONTACTS</div>
    </div>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    let myPhone = "", myName = "", currentChatId = "", msgListener = null;

    // --- Tab Switcher ---
    function switchTab(id, el) {
        document.querySelectorAll('.content-body').forEach(b => b.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id + 'Tab').classList.add('active-tab');
        el.classList.add('active');
    }

    // --- Authentication ---
    async function handleLogin() {
        const p = document.getElementById('phoneIn').value, n = document.getElementById('nameIn').value, pw = document.getElementById('passIn').value;
        if(p.length < 10 || !n) return alert("መረጃ ያሟሉ!");
        const email = p + "@sayint.com";
        try { await auth.signInWithEmailAndPassword(email, pw); } catch(e) { await auth.createUserWithEmailAndPassword(email, pw); }
        db.ref('users/' + p).set({ phone: p, name: n });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            myPhone = user.email.split('@')[0];
            document.getElementById('loginScreen').style.display = "none";
            db.ref('users/' + myPhone).once('value', s => { if(s.exists()) myName = s.val().name; });
            initApp();
        }
    });

    // --- Group Creation ---
    function createGroup() {
        const groupName = prompt("የቡድኑን ስም ያስገቡ፦");
        if(!groupName) return;
        const groupId = "group_" + Date.now();
        db.ref('chats/' + groupId).set({ title: groupName, type: 'group', createdBy: myPhone });
        openChat(groupId, groupName);
    }

    // --- Chat Logic ---
    function openChat(id, title) {
        currentChatId = id;
        document.getElementById('chatRoom').style.left = "0";
        document.getElementById('roomTitle').innerText = title;
        document.getElementById('roomAvatar').innerText = title.charAt(0);
        
        const box = document.getElementById('messageBox'); box.innerHTML = "";
        if(msgListener) db.ref('messages/' + id).off();
        msgListener = db.ref('messages/' + id).limitToLast(40).on('child_added', snap => {
            const m = snap.val(), isMe = m.senderPhone === myPhone;
            let content = "";
            if(m.type === 'text') content = m.content;
            else if(m.type === 'image') content = `<img src="${m.content}" class="msg-img" onclick="window.open(this.src)">`;
            else if(m.type === 'voice') content = `<audio controls src="${m.content}"></audio>`;

            box.innerHTML += `<div class="msg-wrap ${isMe?'sent':'received'}">
                <span class="sender-n">${isMe?'እኔ':m.senderName}</span>
                <div class="bubble">${content}</div>
            </div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chatRoom').style.left = "100%"; }

    function sendTxt() {
        const val = document.getElementById('msgInput').value;
        if(!val) return;
        db.ref('messages/' + currentChatId).push({ senderName: myName, senderPhone: myPhone, type: 'text', content: val });
        document.getElementById('msgInput').value = "";
    }

    async function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('messages/' + currentChatId).push({ senderName: myName, senderPhone: myPhone, type: 'image', content: e.target.result });
    }

    // --- Voice Record ---
    let mediaRec, chunks = [];
    async function startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            const reader = new FileReader(); reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => db.ref('messages/' + currentChatId).push({ senderName: myName, senderPhone: myPhone, type: 'voice', content: reader.result });
            chunks = [];
        };
        mediaRec.start();
        document.getElementById('micBtn').className = "fas fa-stop";
        document.getElementById('micBtn').onclick = () => { mediaRec.stop(); document.getElementById('micBtn').className = "fas fa-microphone"; document.getElementById('micBtn').onclick = startVoice; };
    }

    // --- Initial Load ---
    function initApp() {
        // Users & Private Chats
        db.ref('users').on('value', s => {
            const list = document.getElementById('allContactsList'); list.innerHTML = "";
            s.forEach(c => {
                const u = c.val(); if(u.phone === myPhone) return;
                const chatId = [myPhone, u.phone].sort().join('_');
                list.innerHTML += `<div class="item-row" onclick="openChat('${chatId}', '${u.name}')"><div class="avatar">${u.name.charAt(0)}</div><div class="item-info"><b>${u.name}</b><p>${u.phone}</p></div></div>`;
            });
        });
        // Active Groups
        db.ref('chats').on('value', s => {
            const list = document.getElementById('chatHistoryList'); list.innerHTML = "";
            s.forEach(c => {
                const g = c.val();
                list.innerHTML += `<div class="item-row" onclick="openChat('${c.key}', '${g.title}')"><div class="avatar" style="background:#2ecc71"><i class="fas fa-users"></i></div><div class="item-info"><b>${g.title}</b><p>የቡድን ቻት</p></div></div>`;
            });
        });
        // Stories
        db.ref('stories').on('value', s => {
            const grid = document.getElementById('storyList'); grid.innerHTML = "";
            s.forEach(c => { const st = c.val(); grid.innerHTML += `<div class="story-card"><img src="${st.img}"><div style="position:absolute; bottom:10px; left:10px; color:white; font-size:12px;">${st.sender}</div></div>`; });
        });
    }

    async function postStory(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => db.ref('stories').push({ sender: myName, img: e.target.result });
    }

    function startCall() { document.getElementById('videoOverlay').style.display = "block"; jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Sayint_Call_" + currentChatId, width: "100%", height: "100%", parentNode: document.getElementById('videoOverlay'), configOverwrite: { disableDeepLinking: true } }); }
    function stopCall() { document.getElementById('videoOverlay').style.display = "none"; if(jitsiApi) jitsiApi.dispose(); }

</script>
</body>
</html>
