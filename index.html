<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሳይንት ሊንክ | በስልክ ቁጥር የሚሰራ</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #128C7E; --secondary: #25D366; --bg: #ece5dd; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        
        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        /* Chat Header */
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .live-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 12px; }

        /* Chat Area */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 15px; }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--white); border-bottom-left-radius: 2px; }
        .sender { font-size: 10px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 3px; }

        /* Footer Input */
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .btn-icon { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Login View -->
<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary)">ሳይንት ሊንክ</h2>
        <p>በስልክ ቁጥርዎ ይግቡ</p>
        <input type="text" id="phoneInput" placeholder="ስልክ ቁጥር (ምሳሌ፡ 0912...)">
        <input type="password" id="passInput" placeholder="ሚስጥራዊ ቃል (Password)">
        <button class="btn-icon" style="background:var(--primary); color:white; width:100%; padding:12px; border-radius:10px; font-size:16px;" onclick="handleLogin()">መልክተኛውን ክፈት</button>
        <p style="font-size:12px; margin-top:10px;">ቁጥርዎ ለመጀመሪያ ጊዜ ከሆነ ይመዘገባል።</p>
    </div>
</div>

<header>
    <div>
        <h3 id="myPhoneDisp" style="margin:0; font-size:16px;">ሳይንት ሊንክ</h3>
        <small>በቀጥታ ግንኙነት ላይ</small>
    </div>
    <a href="https://meet.jit.si/SayintLiveRoom" target="_blank" class="live-btn"><i class="fas fa-video"></i> Live</a>
</header>

<div id="chatBox"></div>

<div class="input-bar">
    <button class="btn-icon" onclick="startVoice()"><i id="micIcon" class="fas fa-microphone"></i></button>
    <input type="text" id="msgInput" placeholder="መልዕክት...">
    <button class="btn-icon" onclick="sendText()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAVn2jp_TR6Wjq1i_i5Xmk1Q6ea96KHMIQ",
        authDomain: "sayint-gebaye.firebaseapp.com",
        projectId: "sayint-gebaye",
        storageBucket: "sayint-gebaye.firebasestorage.app",
        messagingSenderId: "239223565179",
        appId: "1:239223565179:web:e4a4c57367fb3354846bde",
        databaseURL: "https://sayint-gebaye-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let currentUserPhone = "";
    let mediaRecorder, chunks = [];

    // --- 1. Login Logic ---
    async function handleLogin() {
        const phone = document.getElementById('phoneInput').value;
        const pass = document.getElementById('passInput').value;
        if(phone.length < 10) { alert("ትክክለኛ ስልክ ያስገቡ"); return; }
        
        // ብልህ ዘዴ፡ ስልኩን ወደ ኢሜይል መቀየር
        const fakeEmail = phone + "@sayint.com";
        
        try {
            await auth.signInWithEmailAndPassword(fakeEmail, pass);
        } catch(e) {
            await auth.createUserWithEmailAndPassword(fakeEmail, pass);
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            currentUserPhone = user.email.split('@')[0];
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('myPhoneDisp').innerText = "📱 " + currentUserPhone;
        }
    });

    // --- 2. Message Logic ---
    function sendText() {
        const txt = document.getElementById('msgInput').value;
        if(!txt) return;
        db.ref('messages').push({ sender: currentUserPhone, type: 'text', content: txt, time: Date.now() });
        document.getElementById('msgInput').value = "";
    }

    async function startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => {
                db.ref('messages').push({ sender: currentUserPhone, type: 'voice', content: reader.result, time: Date.now() });
            };
            chunks = [];
        };
        mediaRecorder.start();
        document.getElementById('micIcon').className = "fas fa-stop";
        document.getElementById('micIcon').style.color = "red";
        document.querySelector('.btn-icon').onclick = () => { mediaRecorder.stop(); document.getElementById('micIcon').className = "fas fa-microphone"; document.getElementById('micIcon').style.color = "#128C7E"; document.querySelector('.btn-icon').onclick = startVoice; };
    }

    // --- 3. Receive Messages ---
    db.ref('messages').limitToLast(20).on('child_added', snap => {
        const m = snap.val();
        const isMe = m.sender === currentUserPhone;
        const chatBox = document.getElementById('chatBox');
        let content = m.type === 'text' ? m.content : `<audio controls src="${m.content}"></audio>`;
        
        chatBox.innerHTML += `
            <div class="msg ${isMe ? 'sent' : 'received'}">
                <span class="sender">${isMe ? 'እኔ' : m.sender}</span>
                ${content}
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
